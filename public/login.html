<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Entrar | LM TECH 93</title>
  <style>
    body{font-family:Arial,sans-serif;background:#07111f;color:#fff;padding:20px}
    .box{max-width:420px;margin:40px auto;background:#0d1829;padding:20px;border-radius:16px}
    input,button{width:100%;padding:12px;margin-top:10px;border-radius:10px;border:none;box-sizing:border-box}
    input{background:#132238;color:#fff}
    button{background:#00e5ff;color:#03131a;font-weight:700;cursor:pointer}
    a{color:#8cefff}
  </style>
</head>
<body>
  <div class="box">
    <h1>Entrar</h1>
    <input id="full_name" placeholder="Seu nome" />
    <input id="phone" placeholder="Seu telefone" />
    <input id="email" type="email" placeholder="Seu email" />
    <input id="password" type="password" placeholder="Sua senha" />
    <button id="signupBtn">Criar conta</button>
    <button id="loginBtn">Entrar</button>
    <p id="msg"></p>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const supabase = createClient(
      'SUPABASE_URL_AQUI',
      'SUPABASE_ANON_KEY_AQUI'
    );

    const msg = document.getElementById('msg');

    document.getElementById('signupBtn').onclick = async () => {
      const full_name = document.getElementById('full_name').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      const { error } = await supabase.auth.signUp({
        email,
        password,
        options: {
          data: { full_name, phone }
        }
      });

      msg.textContent = error ? error.message : 'Conta criada. Agora entra.';
    };

    document.getElementById('loginBtn').onclick = async () => {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();

      const { data, error } = await supabase.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        msg.textContent = error.message;
        return;
      }

      localStorage.setItem('lm_access_token', data.session.access_token);
      window.location.href = '/';
    };
  </script>
</body>
</html>
